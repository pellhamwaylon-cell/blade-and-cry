<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blade and Cry</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/MozillaReality/ammo.js@8bbc0ea/builds/ammo.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@c-frame/aframe-physics-system@4.2.4/dist/aframe-physics-system.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <script src="js/physics.js"></script>
  <script src="js/movement.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/inventory.js"></script> 
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- UI HUD with Hotbar -->
  <div id="ui-layer">
    <h2>Blade and Cry <span id="mode-badge">[PC MODE]</span></h2>
    <p>Press <strong>TAB</strong> for Spawning Book | <strong>Scroll Wheel</strong> to switch weapons</p>
    <div id="hotbar-ui"></div>
  </div>

  <div id="spawn-book" class="hidden">
    <div class="book-header">
      <h3>Mod Spawner</h3>
      <button onclick="toggleBook()">X</button>
    </div>
    <div class="book-layout">
      <div id="book-categories"></div>
      <div id="book-items"></div>
    </div>
  </div>

  <a-scene physics="driver: ammo; debug: false;" webxr="referenceSpaceType: local-floor" shadow="type: pcfsoft">
    
    <!-- BETTER LIGHTING -->
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" color="#666"></a-light>
    <a-light type="directional" position="-5 10 5" intensity="1.2" cast-shadow="true"></a-light>

    <!-- MAP CONTAINER (Switched via inventory.js) -->
    <a-entity id="map-container">
      
      <!-- MAP 1: COLOSSEUM -->
      <a-entity id="map_colosseum" class="map-instance">
        <a-box position="0 -5 0" width="50" height="10" depth="50" color="#d2b48c" ammo-body="type: static" ammo-shape="type: box" shadow="receive: true"></a-box>
        <!-- CLIMBABLE WALLS -->
        <a-box class="climbable" position="0 2 -25" width="50" height="10" depth="1" color="#8b7355" ammo-body="type: static" shadow="receive: true"></a-box>
        <a-box class="climbable" position="0 2 25" width="50" height="10" depth="1" color="#8b7355" ammo-body="type: static" shadow="receive: true"></a-box> 
        <a-box class="climbable" position="-25 2 0" width="1" height="10" depth="50" color="#8b7355" ammo-body="type: static" shadow="receive: true"></a-box>
        <a-box class="climbable" position="25 2 0" width="1" height="10" depth="50" color="#8b7355" ammo-body="type: static" shadow="receive: true"></a-box>
        
        <!-- THE MIRROR -->
        <a-box position="0 2 -24" width="4" height="4" depth="0.1" color="#aaa" material="metalness: 1; roughness: 0.1;" shadow="cast: true"></a-box>
      </a-entity>

      <!-- MAP 2: HOUSE (Hidden by default) -->
      <a-entity id="map_house" class="map-instance" visible="false">
        <a-box position="0 -5 0" width="30" height="10" depth="30" color="#4F7942" ammo-body="type: static" shadow="receive: true"></a-box>
        <a-box class="climbable" position="0 2.5 -5" width="10" height="5" depth="10" color="#eaddcf" ammo-body="type: static" shadow="cast: true"></a-box>
      </a-entity>

    </a-entity>

    <!-- MASTER PLAYER RIG -->
    <a-entity id="player-rig" movement-controls="speed: 0.15" position="0 0 0" player-movement>
      
      <!-- Body Mesh -->
      <a-entity id="body-mesh" shadow="cast: true">
        <a-box id="torso" position="0 1.0 0" width="0.4" height="0.6" depth="0.2" color="#2c3e50"></a-box>
        <a-box id="equipped-armor" position="0 1.0 0" width="0.42" height="0.62" depth="0.22" color="gold" visible="false"></a-box>
        <a-cylinder id="arm-l" position="-0.28 1.0 0" radius="0.05" height="0.6" color="#34495e"></a-cylinder>
        <a-cylinder id="arm-r" position="0.28 1.0 0" radius="0.05" height="0.6" color="#34495e"></a-cylinder>
        <a-cylinder id="leg-l" position="-0.12 0.35 0" radius="0.06" height="0.7" color="#1a252f"></a-cylinder>
        <a-cylinder id="leg-r" position="0.12 0.35 0" radius="0.06" height="0.7" color="#1a252f"></a-cylinder>
      </a-entity>

      <a-entity id="head-level" position="0 1.6 0">
        <!-- Invisible Head Box for mirror viewing -->
        <a-box id="head-mesh" position="0 0 0" width="0.25" height="0.25" depth="0.25" color="#ecf0f1" shadow="cast: true"></a-box>

        <a-entity id="head" camera look-controls="pointerLockEnabled: true" position="0 0 0">
          
          <a-entity id="pc-cursor" raycaster="objects: .climbable, .clickable" position="0 0 -1" visible="false"></a-entity>
          
          <!-- NATURAL DUAL ARMS -->
          <a-entity id="pc-viewmodel">
            <!-- Left Arm (Resting angled down) -->
            <a-entity id="vm-arm-l" position="-0.3 -0.5 -0.3" rotation="-40 10 0">
              <a-box width="0.08" height="0.08" depth="0.5" position="0 0 0.15" color="#f1c27d" shadow="cast: true"></a-box>
            </a-entity>
            <!-- Right Arm (Holds weapons) -->
            <a-entity id="vm-arm-r" position="0.3 -0.4 -0.4" rotation="-20 -10 0">
              <a-box width="0.08" height="0.08" depth="0.5" position="0 0 0.15" color="#f1c27d" shadow="cast: true"></a-box>
              <a-entity id="pc-grip" position="0 0 -0.15"></a-entity>
            </a-entity>
          </a-entity>

        </a-entity>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
