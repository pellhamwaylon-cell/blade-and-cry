<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blade and Cry</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/MozillaReality/ammo.js@8bbc0ea/builds/ammo.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@c-frame/aframe-physics-system@4.2.4/dist/aframe-physics-system.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <script src="js/physics.js"></script>
  <script src="js/movement.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/inventory.js"></script> <!-- NEW: Handles the Book and Saving -->
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- UI HUD -->
  <div id="ui-layer">
    <h2>Blade and Cry <span id="mode-badge">[PC MODE]</span></h2>
    <p>Press <strong>TAB</strong> to open the Spawning Book</p>
  </div>

  <!-- THE SPAWNING BOOK (Moddable Inventory) -->
  <div id="spawn-book" class="hidden">
    <div class="book-header">
      <h3>Mod Spawner</h3>
      <button onclick="toggleBook()">X</button>
    </div>
    <div class="book-layout">
      <div id="book-categories">
        <!-- Categories injected by JS -->
      </div>
      <div id="book-items">
        <!-- Items injected by JS -->
      </div>
    </div>
  </div>

  <a-scene physics="driver: ammo; debug: false;" webxr="referenceSpaceType: local-floor">
    <a-sky color="#87CEEB"></a-sky>

    <a-entity id="colosseum-map">
      <a-box position="0 -5 0" width="50" height="10" depth="50" color="#d2b48c" ammo-body="type: static; friction: 0.8" ammo-shape="type: box"></a-box>
      <a-box position="0 2 -25" width="50" height="5" depth="1" color="#8b7355" ammo-body="type: static" ammo-shape="type: box"></a-box>
      <a-box position="0 2 25" width="50" height="5" depth="1" color="#8b7355" ammo-body="type: static" ammo-shape="type: box"></a-box> 
      <a-box position="-25 2 0" width="1" height="5" depth="50" color="#8b7355" ammo-body="type: static" ammo-shape="type: box"></a-box>
      <a-box position="25 2 0" width="1" height="5" depth="50" color="#8b7355" ammo-body="type: static" ammo-shape="type: box"></a-box>
    </a-entity>

    <!-- MASTER PLAYER RIG -->
    <a-entity id="player-rig" movement-controls="speed: 0.15" position="0 0 0" player-movement>
      
      <!-- Body Mesh (Follows rig perfectly now) -->
      <a-entity id="body-mesh">
        <a-box id="torso" position="0 1.0 0" width="0.4" height="0.6" depth="0.2" color="#2c3e50"></a-box>
        <!-- The Armor layer (Visible when equipped) -->
        <a-box id="equipped-armor" position="0 1.0 0" width="0.42" height="0.62" depth="0.22" color="gold" visible="false"></a-box>
        
        <a-cylinder id="arm-l" position="-0.28 1.0 0" radius="0.05" height="0.6" color="#34495e"></a-cylinder>
        <a-cylinder id="arm-r" position="0.28 1.0 0" radius="0.05" height="0.6" color="#34495e"></a-cylinder>
        <a-cylinder id="leg-l" position="-0.12 0.35 0" radius="0.06" height="0.7" color="#1a252f"></a-cylinder>
        <a-cylinder id="leg-r" position="0.12 0.35 0" radius="0.06" height="0.7" color="#1a252f"></a-cylinder>
      </a-entity>

      <!-- Head Level -->
      <a-entity id="head-level" position="0 1.6 0">
        <!-- FIXED: Pure Camera Entity so it doesn't fight movement-controls -->
        <a-entity id="head" camera look-controls="pointerLockEnabled: true" position="0 0 0">
          
          <a-entity id="pc-cursor" cursor="rayOrigin: entity" raycaster="objects: .clickable" 
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02" 
                    position="0 0 -1" material="color: white; shader: flat" opacity="0.5"></a-entity>
          
          <!-- MINECRAFT STYLE PC VIEWMODEL ARM -->
          <a-entity id="pc-viewmodel" position="0.35 -0.3 -0.5">
            <a-box width="0.08" height="0.08" depth="0.4" position="0 0 0.1" color="#f1c27d"></a-box>
            <!-- Weapons snap to this exact anchor at the end of the arm -->
            <a-entity id="pc-grip" position="0 0 -0.15"></a-entity>
          </a-entity>

        </a-entity>
      </a-entity>

      <!-- VR Hands -->
      <a-entity id="left-hand" laser-controls="hand: left" raycaster="objects: .clickable" ammo-body="type: kinematic" ammo-shape="type: sphere; fit: manual; sphereRadius: 0.08" visible="false"></a-entity>
      <a-entity id="right-hand" laser-controls="hand: right" raycaster="objects: .clickable" ammo-body="type: kinematic" ammo-shape="type: sphere; fit: manual; sphereRadius: 0.08" visible="false"></a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
